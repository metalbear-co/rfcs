name: Deploy
on:
  push:
    branches:
      - main
env:
  MDBOOK_VERSION: 0.5.2
  MDBOOK_MERMAID_VERSION: 0.17.0

jobs:
  deploy-main:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Rust
      uses: metalbear-co/setup-rust-toolchain@009cda47e1b529982a00627a40eda87b4215035a
    - name: Install mdbook and mdbook-mermaid
      run: |
        cargo install mdbook --version ${{ env.MDBOOK_VERSION }} --locked
        cargo install mdbook-mermaid --version ${{ env.MDBOOK_MERMAID_VERSION }} --locked
    - name: Generate Book
      run: |
        ./generate-book.py
    - name: Publish to gh-pages
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        temp_dir="$(mktemp -d)"
        trap 'rm -rf "${temp_dir}"' EXIT

        git init -b gh-pages "${temp_dir}"
        cd "${temp_dir}"
        git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

        if git fetch --depth=1 origin gh-pages; then
          git checkout -B gh-pages FETCH_HEAD
        else
          git checkout --orphan gh-pages
        fi
        
        # Sync main RFC page artifacts while keeping PR preview pages
        find . -mindepth 1 -maxdepth 1 ! -name .git ! -name pr-preview -exec rm -rf {} +
        rsync -a "${GITHUB_WORKSPACE}/book/" "${temp_dir}/"

        if [ -n "$(git status --porcelain)" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy main site for ${GITHUB_SHA}"
          git push origin gh-pages
        else
          echo "No changes to publish."
        fi
